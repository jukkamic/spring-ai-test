spring.main.banner-mode=off

scaffoldkit.mcp.enabled=true
spring.ai.mcp.server.enabled=true
scaffoldkit.mcp.port=9090

# DATABASE (Scaffolding Source)

# Using H2 for the construction site makes it zero-config
# spring.datasource.url=jdbc:h2:mem:construction_db;DB_CLOSE_DELAY=-1

# Using in-memory database for dev profile to avoid file lock conflicts with test profile
spring.datasource.url=jdbc:h2:mem:dev_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL

spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Automatically update database schema
spring.jpa.hibernate.ddl-auto=update
