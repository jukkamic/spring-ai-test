<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="badge">
    <div 
        class="relative flex items-center space-x-2"
        hx-get="/api/materials/low-stock/count"
        hx-trigger="every 30s"
        hx-swap="innerHTML"
        id="low-stock-badge">
        <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
        </svg>
        <span th:if="${lowStockCount > 0}" 
              class="absolute -top-2 -right-2 inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-white transform translate-x-1/4 -translate-y-1/4 bg-red-500 rounded-full">
            <span th:text="${lowStockCount}">0</span>
        </span>
    </div>
</th:block>

<th:block th:fragment="count-update">
    <span th:if="${count > 0}" 
          class="absolute -top-2 -right-2 inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-white transform translate-x-1/4 -translate-y-1/4 bg-red-500 rounded-full">
        <span th:text="${count}">0</span>
    </span>
</th:block>
</html>
