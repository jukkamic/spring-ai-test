# ==========================================================
# CONSTRUCTION SITE CONFIGURATION (MCP & DEV)
# ==========================================================

# 1. CORE IDENTITY
spring.application.name=springai-test

# 4. LOGGING REDIRECTION
# We must keep the Console (System.out) clear for MCP JSON data.
# This sends all logs to a file instead so you can still debug.
logging.pattern.console=
logging.file.name=logs/dev-construction.log
logging.level.root=WARN
logging.level.fi.kotkis=WARN

# 5. DATABASE (Scaffolding Source)
# Using H2 for the construction site makes it zero-config
spring.datasource.url=jdbc:h2:mem:construction_db;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=SET_USERNAME
spring.datasource.password=SET_PASSWORD
#spring.h2.console.enabled=false

# 6. JPA / HIBERNATE SETTINGS
# Enable automatic schema generation
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

