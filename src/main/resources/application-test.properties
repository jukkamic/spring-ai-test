# 1. Total Kill Switch for the MCP Server
spring.ai.mcp.server.enabled=false

# 2. Specifically disable the STDIO transport (the most common 'hang' culprit)
spring.ai.mcp.server.stdio=false

# 3. Disable the scanner that looks for @McpTool annotations
spring.ai.mcp.server.annotation-scanner.enabled=false

# Web server configuration
server.port=8080

spring.datasource.url=jdbc:h2:file:${user.dir}/data/ledgerdb;DB_CLOSE_DELAY=-1

spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
